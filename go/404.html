<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Shadows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        
        body {
            background-color: #05080f;
            color: #e2e8f0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .shadow-samurai {
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .blood-grid {
            background-size: 50px 50px;
            background-image: radial-gradient(circle, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen blood-grid">

    <div class="text-center px-6">
        <div class="mb-8 shadow-samurai">
            <i class="fa-solid fa-user-ninja text-8xl text-red-600"></i>
        </div>

        <h1 class="text-9xl font-black text-white/5 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none">404</h1>

        <h2 class="text-3xl md:text-5xl font-black mb-4 relative z-10 uppercase tracking-tighter">
            Path Lost in the <span class="text-red-600">Shadows</span>
        </h2>
        
        <p class="text-slate-500 mb-10 max-w-md mx-auto relative z-10">
            You have ventured beyond the known map. This area is guarded by silent warriors. It is best to return to the village.
        </p>

        <a href="index.html" class="inline-flex items-center gap-3 px-8 py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-full transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(220,38,38,0.3)]">
            <i class="fa-solid fa-torii-gate"></i>
            Return to Village
        </a>
    </div>

    <div class="absolute bottom-10 left-0 w-full text-center">
        <p class="text-[10px] text-slate-700 tracking-[0.5em] uppercase">KAMIREXIO | NINJA PROTOCOL</p>
    </div>

</body>
</html>
